name: Build ghcr.io/n3ary/gtfs-rt

# Requires: GHCR_TOKEN (packages:write for n3ary org), NPM_TOKEN
# (GH Packages, already used by daily.yml).
# amd64 only. arm64 needs docker/setup-qemu-action; add it before
# the build step when a CAX (arm64) migration becomes real.

on:
  push:
    branches: [main]
    tags: ['gtfs-rt-v*']
    paths:
      - 'apps/gtfs-rt/**'
      - 'libs/spec/**'
      - 'apps/gtfs-static/**'
      - '.github/workflows/build-gtfs-rt.yml'
      - 'apps/gtfs-rt/Containerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Skip build when the release bot (n3ary-release-bot) is the actor.
    # The bot's release/calver-* PRs land on main as a squash merge; the
    # `push` event fires with `github.actor = n3ary-release-bot[bot]`.
    # The bot bumps `libs/spec/package.json`, which matches the paths
    # filter above. A version-only commit would build and push a
    # byte-identical container image.
    if: github.actor != 'n3ary-release-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Login to GHCR
        # Org-scoped push needs GHCR_TOKEN (packages:write on n3ary);
        # the runner's default GITHUB_TOKEN is bound to the runner's
        # repo, so a PAT is required.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ciotlosm
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        # secret-envs maps a runner-side env var to a BuildKit
        # secret mount at /run/secrets/<id> for the Containerfile's
        # RUN --mount=type=secret,id=npm_token. The token never
        # lands in a layer.
        uses: docker/build-push-action@v7
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          context: .
          file: apps/gtfs-rt/Containerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/n3ary/gtfs-rt:sha-${{ github.sha }}
            ghcr.io/n3ary/gtfs-rt:latest
          secret-envs: |
            npm_token=NPM_TOKEN

      - name: Summarise
        run: |
          echo "## gtfs-rt build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- tags pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`ghcr.io/n3ary/gtfs-rt:sha-${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "  - \`ghcr.io/n3ary/gtfs-rt:latest\`" >> "$GITHUB_STEP_SUMMARY"
