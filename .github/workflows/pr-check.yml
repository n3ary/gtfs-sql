# ----------------------------------------------------------------------------
# [check] PR validation (on PR)
#
# Validates every PR: shared ASCII + standards-drift checks, repo-specific
# build + test + pipeline smoke. Never pushes to the branch.
#
# Trigger:     pull_request
# Permissions: contents: read, packages: read
# Secrets:     NPM_TOKEN, TRANZY_API_KEY (optional, for pipeline smoke)
# Owner:       @ciotlosm
# Run time:    ~3-7 min (longer if pipeline smoke runs)
# ----------------------------------------------------------------------------
name: '[check] PR validation (on PR)'

on:
  pull_request:
    branches: [main]

# Shared PR-check lives in n3ary/actions. The shared wrapper
# (`pr-check.yml`) handles ascii + standards-drift. Repo-specific
# jobs (build, pipeline smoke) stay local because they need repo
# secrets (NPM_TOKEN, TRANZY_API_KEY) and the full pipeline runner.

permissions:
  contents: read
  packages: read

jobs:
  pr-check:
    uses: n3ary/actions/.github/workflows/pr-check.yml@v23

  validate:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs: GitHub blocks `dependabot[bot]` from
    # accessing repository secrets (NPM_TOKEN) by default, so
    # `pnpm install` would 401 on an empty _authToken. Dependabot
    # PRs only bump version refs in this repo, so the heavy
    # validation adds no signal here. Shared checks (ASCII-only,
    # Standards drift) above still run.
    # Refs:
    #   - https://docs.github.com/en/code-security/dependabot/working-with-dependabot/configuring-access-to-private-packages-for-dependabot-version-updates
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm with GH Packages auth + install
        # Replaces the previous ~25-line manual setup (checkout +
        # setup-node + setup-pnpm + HOME-scoped .npmrc + pnpm
        # install). --trust-lockfile: pnpm 11's supply-chain
        # re-verification can reject fresh publishes within 24h of
        # their release; we don't need that since the lockfile is
        # source-tree and goes through PR review.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v22
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Skip heavy checks for metadata-only changes
        id: skip-heavy
        # Skip the full pipeline (which fetches upstream sources and is
        # the slowest step at ~7-10 min) when the PR only changes
        # metadata. Tests still run above. Same paths as
        # `paths-ignore` on the daily.yml workflow.
        run: |
          NON_META=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|.github/*|.gitignore|LICENSE|outputs/*) : ;;
              apps/*/outputs/*|libs/*/outputs/*|pnpm-lock.yaml|tsconfig*.json) : ;;
              apps/*/tsconfig.json|libs/*/tsconfig.json) : ;;
              *) NON_META="$NON_META $f" ;;
            esac
          done < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if [ -z "$NON_META" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=metadata-only diff" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "reason=non-metadata: $NON_META" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline (smoke check)
        if: steps.skip-heavy.outputs.skip != 'true'
        # Don't actually publish - `SKIP_PUBLISH=1` makes the pipeline
        # produce outputs/feeds.json + outputs/*.sqlite3.gz +
        # outputs/*.gtfs.zip without uploading to R2.
        #
        # Per-feed adapter secrets are declared in feeds/<id>/config.json
        # under `secrets[]`. When ANY of them is unavailable on PR forks,
        # `SKIP_ADAPTER_DRY_RUN=1` short-circuits the per-feed adapter
        # call and substitutes a tiny synthetic GTFS zip so the rest of
        # the pipeline (sqlite build, feeds.json emit, prune list) still
        # exercises end-to-end with zero external HTTP - true dry mode,
        # not fail-open. Today only TRANZY_API_KEY is in play (the
        # cluj adapter's only required secret); the conditional flips
        # dry-mode on if it is absent.
        env:
          TRANZY_API_KEY: ${{ secrets.TRANZY_API_KEY || '' }}
          SKIP_ADAPTER_DRY_RUN: ${{ secrets.TRANZY_API_KEY == '' && '1' || '' }}
        run: |
          if [ -n "${TRANZY_API_KEY:-}" ]; then
            echo "[ci] feed secrets present - running full pipeline."
            STRICT=false SKIP_PUBLISH=1 pnpm pipeline
          else
            echo "[ci] feed secrets unavailable - using SKIP_ADAPTER_DRY_RUN=1."
            echo "[ci] (no external HTTP, synthetic GTFS zip substituted)"
            STRICT=false SKIP_PUBLISH=1 SKIP_ADAPTER_DRY_RUN=1 pnpm pipeline
          fi
