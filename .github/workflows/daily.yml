name: "Daily multi-feed pipeline → binaries"

# Builds outputs/ and pushes to the `binaries` branch on success.
# Triggers: cron 00:30 UTC (after Transitous's ~00:00 UTC daily import)
# + manual workflow_dispatch.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
  # PR merges to main also trigger a build. Combined with branch
  # protection (PR-required), this means every change goes through CI
  # before being eligible to publish.
  push:
    branches:
      - main
    paths-ignore:
      # Docs-only changes (any README, anywhere) don't need a rebuild.
      # Force a build by including a non-md change in the PR.
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: node src/pipeline/build-all.js
        env:
          STRICT: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to binaries
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          DIR="/tmp/binaries"

          if ! git clone --single-branch --branch binaries --depth 1 "$REMOTE" "$DIR" 2>/dev/null; then
            # First-ever build for this branch: create as orphan.
            git clone --depth 1 "$REMOTE" "$DIR"
            cd "$DIR"
            git checkout --orphan binaries
            git rm -rf . >/dev/null
            cd -
          fi

          cp -r outputs/* "$DIR/"
          cd "$DIR"

          # Migration: lift any reused .sqlite3.gz out of the legacy
          # feeds/ subdirectory so it survives the prune below. (The
          # build script's ETag-reuse path skips re-emitting these,
          # assuming the previous publish is still around.)
          if [ -d feeds ]; then
            for f in feeds/*.sqlite3.gz; do
              [ -e "$f" ] || continue
              mv -n "$f" "$(basename "$f")"
            done
          fi

          # Prune anything not referenced by the new feeds.json. Single
          # source of truth: feeds.json `files.sqlite_gz`. Walks both the
          # current flat layout and the legacy `feeds/` subdirectory so
          # one publish cycle is enough to delete old paths.
          EXPECTED=$(jq -r '.feeds[] | .files.sqlite_gz | select(.)' feeds.json | sort -u)
          for f in *.sqlite3.gz feeds/*; do
            [ -e "$f" ] || continue
            if ! printf '%s\n' "$EXPECTED" | grep -qxF "$f"; then
              echo "[publish] pruning orphan: $f"
              rm -rf "$f"
            fi
          done
          # Drop the legacy directory once it's empty.
          [ -d feeds ] && rmdir feeds 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"
          else
            git commit -m "pipeline: $DATE"
            git push origin binaries
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
