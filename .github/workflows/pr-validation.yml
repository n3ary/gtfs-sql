name: PR Validation

on:
  pull_request:
    branches: [main]

# Ensure the PR is up-to-date before merging (protects version sequencing).
# GitHub branch protection "Require branches to be up-to-date" enforces this
# at the merge button level; this workflow re-validates on every push.

permissions:
  contents: write  # needed to push version-bump commit back to PR branch

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-bump version to main + 1
        run: |
          # Skip version bump if PR only touches metadata files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          NON_META_FILES=$(echo "$CHANGED_FILES" | grep -vE '^(docs/|\.github/|\.gitignore|LICENSE)' || true)
          if [ -z "$NON_META_FILES" ]; then
            echo "PR only changes metadata — skipping version bump"
            exit 0
          fi

          # Get the current version on main
          MAIN_VERSION=$(git show origin:main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          # Increment the patch. Handles pre-release tags (e.g. 0.2.0-m1 → 0.2.1-m1)
          # by preserving the suffix across the bump. Fails loudly on
          # unparseable versions.
          NEXT_VERSION=$(node -e '
            const v = process.argv[1].match(/^(\d+)\.(\d+)\.(\d+)(-.+)?$/);
            if (!v) { console.error("Unparseable version:", process.argv[1]); process.exit(1); }
            const [, major, minor, patchStr, prerelease = ""] = v;
            console.log(`${major}.${minor}.${Number(patchStr) + 1}${prerelease}`);
          ' "$MAIN_VERSION")
          # Get this branch's current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          echo "Main version: $MAIN_VERSION"
          echo "Next version: $NEXT_VERSION"
          echo "PR branch version: $CURRENT_VERSION"

          if [ "$CURRENT_VERSION" != "$NEXT_VERSION" ]; then
            echo "Bumping version from $CURRENT_VERSION to $NEXT_VERSION"
            npm version "$NEXT_VERSION" --no-git-tag-version
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore(release): auto-bump to v${NEXT_VERSION}"
            git push
          else
            echo "Version already correct ($CURRENT_VERSION), skipping bump"
          fi

      - name: Run tests
        run: npm test

      - name: Run linter
        run: npm run lint

      - name: Run pipeline (smoke check)
        # Don't actually publish — `SKIP_PUBLISH=1` makes the pipeline
        # produce outputs/feeds.json + outputs/*.sqlite3.gz without
        # uploading to R2.
        run: SKIP_PUBLISH=1 npm run pipeline