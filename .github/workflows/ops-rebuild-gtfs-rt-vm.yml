name: '[ops] rebuild gtfs-rt VM (manual)'

# Spins up a fresh Hetzner CX23 in nbg1, runs the install script,
# swaps the gtfs-rt.n3ary.com DNS A record to the new VM's primary
# IPv4, then deletes the old VM.
#
# Flow:
#   1. Find the currently-active VM by the role=gtfs-rt label.
#   2. Provision a new VM with the next sequence number, the same
#      firewall, and the same SSH keys.
#   3. SSH to the new VM, run apps/gtfs-rt/config/install.sh, wait
#      for /healthz to return 200 on the new VM.
#   4. Update the Cloudflare DNS A record (gtfs-rt.n3ary.com) to
#      the new VM's primary IPv4. CF propagation is <5 s.
#   5. Delete the old VM. The DNS already points at the new one,
#      so there is no user-visible downtime window - CF edge cache
#      keeps the previous snapshot serving for ~5 s during the
#      swap.
#
# This workflow does NOT redeploy the container - that's
# deploy-gtfs-rt's job. The new VM is bootstrapped with whatever
# image the install.sh / systemd unit pulls (latest at the time).
# A deploy-gtfs-rt run after this rebuild ensures the latest
# image is on the new VM.
#
# Configuration (only what is actually sensitive goes in GH Secrets):
#   Secrets (Settings > Secrets > Actions):
#     HCLOUD_TOKEN            - Hetzner Cloud API token with project
#                               read+write scope.
#     HETZNER_SSH_KEY         - private SSH key (same one as deploy job)
#     CLOUDFLARE_API_TOKEN    - CF API token with Zone DNS edit for
#                               n3ary.com. The DNS record id is a
#                               variable below.
#   Variables (Settings > Variables > Actions; visible to repo
#   readers, used for public config that may differ per env):
#     HETZNER_SSH_PUBLIC_KEY  - PUBLIC half of the same key, kept for
#                               audit; the actual `--ssh-key` argument
#                               uses the key's name (HETZNER_SSH_KEY_NAME
#                               or the default 'github-actions-deploy-gtfs-rt')
#                               because hcloud rejects fingerprint forms.
#     CLOUDFLARE_ZONE_ID      - n3ary.com zone id.
#     CLOUDFLARE_GTFS_RT_A_RECORD_ID - gtfs-rt.n3ary.com A record id.
#   Hardcoded in the workflow:
#     HETZNER_SSH_USER        - root (matches deploy-gtfs-rt.yml).
#     HETZNER_FIREWALL_NAME   - neary-gtfs-rt-01-edge-only (the
#                               firewall id created by ops/hetzner/firewall.sh).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why the rebuild is being triggered (informational only).'
        required: false
        default: ''
  workflow_call:
    inputs:
      reason:
        description: 'Why the rebuild is being triggered (informational only).'
        required: false
        type: string
        default: ''

concurrency:
  group: rebuild-gtfs-rt-vm
  cancel-in-progress: false  # never cancel a half-finished rebuild

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Allow this GH runner's IP on the firewall (temporary)
        # The base firewall (neary-gtfs-rt-01-edge-only) only allows
        # SSH from the operator's home IP. The GH runner's egress IP
        # is a different /32 and changes per job. We add a narrow,
        # self-describing rule for the current run, do the work, and
        # strip the rule in the cleanup step below. No 0.0.0.0/0
        # fallback; the runner's exact IP only, for the duration of
        # this run. The rule description embeds github.run_id so the
        # cleanup step can identify it without a separate manifest.
        id: allow-runner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL: neary-gtfs-rt-01-edge-only
        run: |
          set -euo pipefail
          # GH runner egress IP. Detected once at job start; the
          # value is stable for the duration of the job because it
          # is tied to the runner host, not the job contents. Two
          # endpoints as a belt-and-suspenders check; if they
          # disagree, the second one wins (closer to a public
          # resolver path).
          IP1=$(curl -fsS --max-time 5 https://api.ipify.org || echo "")
          IP2=$(curl -fsS --max-time 5 https://ifconfig.me || echo "")
          if [ -z "$IP1" ] || [ -z "$IP2" ] || [ "$IP1" != "$IP2" ]; then
            echo "::error::could not reliably detect GH runner egress IP (ipify='$IP1' ifconfig='$IP2'); aborting to keep the firewall locked"
            exit 1
          fi
          RUNNER_IP="$IP1"
          echo "detected runner egress IP: ${RUNNER_IP}"
          echo "ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"

          FW_ID=$(hcloud firewall describe "${FIREWALL}" -o json | jq -r '.id')
          hcloud firewall describe "${FIREWALL}" -o json > /tmp/fw_before.json

          # Build the new rules list: existing rules + a single
          # narrow SSH rule for this runner. Done in Python so the
          # JSON is well-formed regardless of how many CF-edge
          # source IPs the existing rules have.
          RUN_DESC="SSH: GH Actions rebuild (run ${{ github.run_id }})"
          python3 - <<PY
          import json
          with open('/tmp/fw_before.json') as f:
              d = json.load(f)
          rules = d['rules']
          rules.append({
              "description": "${RUN_DESC}",
              "direction": "in",
              "port": "22",
              "protocol": "tcp",
              "destination_ips": [],
              "source_ips": ["${RUNNER_IP}/32"],
          })
          with open('/tmp/fw_after.json', 'w') as f:
              json.dump({"rules": rules}, f)
          print(f"appended 1 rule; total now {len(rules)}")
          PY

          # POST via REST API (hcloud CLI has no set-rules).
          curl -fsS -X POST \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/fw_after.json \
            "https://api.hetzner.cloud/v1/firewalls/${FW_ID}/actions/set_rules" \
            | jq -e '.actions[0].status == "success"'
          echo "firewall now allows SSH from ${RUNNER_IP}/32 for the duration of this run"

      - name: Install hcloud + jq
        run: |
          set -euo pipefail
          # hcloud CLI is the documented Hetzner interface. curl-ing
          # the REST API works too, but the CLI handles retries +
          # error formatting for us.
          curl -sSLo /tmp/hcloud.tar.gz \
            https://github.com/hetznercloud/cli/releases/download/v1.49.0/hcloud-linux-amd64.tar.gz
          tar -C /tmp -xzf /tmp/hcloud.tar.gz
          mv /tmp/hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Cleanup rogue VMs from previous runs
        # A previous rebuild that failed mid-way (timeout, network
        # glitch, or a bug) may have left a VM behind - created,
        # maybe bootstrapped, but with the DNS A record never
        # swapped. The role=gtfs-rt label is also wrong on those,
        # so the find-active step below would pick the wrong one.
        # Source of truth for "live" is the Cloudflare A record,
        # not the label. Delete any gtfs-rt-nbg1-* VM whose primary
        # IPv4 does not match the live IP.
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          RECORD_ID: ${{ vars.CLOUDFLARE_GTFS_RT_A_RECORD_ID }}
        run: |
          set -euo pipefail
          : "${ZONE_ID:?CLOUDFLARE_ZONE_ID repo variable is required}"
          : "${RECORD_ID:?CLOUDFLARE_GTFS_RT_A_RECORD_ID repo variable is required}"

          LIVE_IP=$(curl -fsS \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r '.result.content')
          if [ -z "$LIVE_IP" ] || [ "$LIVE_IP" = "null" ]; then
            echo "::error::CF API returned no IP for the gtfs-rt A record; aborting"
            exit 1
          fi
          echo "live IP from CF A record: ${LIVE_IP}"

          # Any gtfs-rt-nbg1-* VM whose IPv4 is not the live IP is
          # a rogue. Hetzner reserves deleted names for ~1 h, so a
          # previous run's orphan blocks the next-name logic - this
          # also lets the next-name step pick a fresh integer.
          ROGUE_IDS=$(hcloud server list -o json | jq -r --arg live "$LIVE_IP" \
            '[.[] | select(.name | startswith("gtfs-rt-nbg1-")) | select(.public_net.ipv4.ip != $live) | .id] | .[]')
          if [ -z "$ROGUE_IDS" ]; then
            echo "no rogue VMs to clean up"
            exit 0
          fi
          for id in $ROGUE_IDS; do
            name=$(hcloud server describe "$id" -o json | jq -r '.name')
            ip=$(hcloud server describe "$id" -o json | jq -r '.public_net.ipv4.ip')
            echo "deleting rogue VM: ${name} (id=${id}, ip=${ip}, live_ip=${LIVE_IP})"
            hcloud server delete "$id"
          done

      - name: Find the currently-active VM
        id: find-active
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # role=gtfs-rt label is the source of truth for "which VM
          # is currently serving gtfs-rt.n3ary.com". install.sh does
          # not add this label (the GH Action does, via
          # --label role=gtfs-rt at create time). For the FIRST VM,
          # there is no label and we fall back to the highest-
          # numbered gtfs-rt-nbg1-N by name.
          ACTIVE_JSON=$(hcloud server list \
            -l "role=gtfs-rt" \
            -o json)
          if [ "$(echo "$ACTIVE_JSON" | jq 'length')" = "0" ]; then
            ACTIVE_NAME=$(hcloud server list \
              -o json | jq -r '[.[] | select(.name | startswith("gtfs-rt-nbg1-"))] | max_by(.name) | .name')
            if [ -z "$ACTIVE_NAME" ] || [ "$ACTIVE_NAME" = "null" ]; then
              echo "no active VM found; treating this as a fresh provision"
              echo "active_name=" >> "$GITHUB_OUTPUT"
              echo "active_id=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            ACTIVE_NAME=$(echo "$ACTIVE_JSON" | jq -r '.[0].name')
          fi
          ACTIVE_ID=$(hcloud server describe "$ACTIVE_NAME" -o json | jq -r '.id')
          ACTIVE_IP=$(hcloud server describe "$ACTIVE_NAME" -o json | jq -r '.public_net.ipv4.ip')
          echo "active_name=${ACTIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "active_id=${ACTIVE_ID}" >> "$GITHUB_OUTPUT"
          echo "active_ip=${ACTIVE_IP}" >> "$GITHUB_OUTPUT"

      - name: Compute next VM name
        id: next-name
        env:
          ACTIVE_NAME: ${{ steps.find-active.outputs.active_name }}
        run: |
          set -euo pipefail
          if [ -z "$ACTIVE_NAME" ]; then
            NEXT="gtfs-rt-nbg1-1"
          else
            # Parse the trailing integer and bump it. Names are
            # gtfs-rt-nbg1-N where N is monotonically increasing.
            N="${ACTIVE_NAME##*-}"
            NEXT="gtfs-rt-nbg1-$((N + 1))"
          fi
          echo "name=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Provision the new VM
        id: create
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          NEW_NAME: ${{ steps.next-name.outputs.name }}
          SSH_KEY_NAME: ${{ vars.HETZNER_SSH_KEY_NAME }}
        run: |
          set -euo pipefail
          FIREWALL="neary-gtfs-rt-01-edge-only"

          # hcloud server create --ssh-key accepts the key's name
          # (or id), not its fingerprint. Earlier versions of this
          # workflow computed the fingerprint via `ssh-keygen -lf`
          # and passed it to --ssh-key; hcloud rejected both the
          # SHA256 and MD5 forms with "SSH key not found", even
          # though the key was registered. The fix is to pass the
          # name directly. The key has to already be registered
          # at the Hetzner project level (Project > Security > SSH
          # keys) under the same name; hcloud looks the key up by
          # name and injects it into /root/.ssh/authorized_keys on
          # first boot.
          #
          # HETZNER_SSH_KEY_NAME is required (no fallback) - a
          # silent default would mask operator mistakes and let
          # the workflow create a VM with whatever key happens to
          # match a hardcoded name. Fail loud instead.
          if [ -z "${SSH_KEY_NAME:-}" ]; then
            echo "::error::HETZNER_SSH_KEY_NAME repo variable is required; set it to the registered Hetzner SSH key name (currently 'github-actions-deploy-gtfs-rt')."
            exit 1
          fi

          echo "creating ${NEW_NAME} (firewall=${FIREWALL}, ssh-key name=${SSH_KEY_NAME})"
          CREATE_OUT=$(hcloud server create \
            --name "${NEW_NAME}" \
            --type cx23 \
            --location nbg1 \
            --image ubuntu-26.04 \
            --ssh-key "${SSH_KEY_NAME}" \
            --label "role=gtfs-rt" \
            --label "created-by=rebuild-gtfs-rt-vm" \
            --label "rebuild-reason=${{ inputs.reason || 'manual' }}" \
            --start-after-create \
            -o json)
          NEW_ID=$(echo "$CREATE_OUT" | jq -r '.server.id')
          NEW_IP=$(echo "$CREATE_OUT" | jq -r '.server.public_net.ipv4.ip')

          # Apply the firewall (best-effort; if it fails we still
          # have the VM, the operator can apply the firewall later).
          hcloud firewall apply-to-resource \
            --type server --server "${NEW_NAME}" \
            "${FIREWALL}" || echo "warn: firewall apply failed; continuing"

          echo "id=${NEW_ID}" >> "$GITHUB_OUTPUT"
          echo "ip=${NEW_IP}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH on the new VM
        env:
          NEW_IP: ${{ steps.create.outputs.ip }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if nc -z -w 2 "$NEW_IP" 22 2>/dev/null; then
              echo "ssh port 22 reachable on ${NEW_IP} after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "fail: SSH never came up on ${NEW_IP}"
          exit 1

      - name: Bootstrap new VM
        # Raw ssh via `run:` instead of appleboy/ssh-action.
        # Tested the appleboy action's `envs: KEY=VALUE`,
        # `envs: KEY`, `allenvs: true` (+ step-level env:) forms
        # on this exact step - all three silently failed to
        # forward GHCR_TOKEN to the remote. install.sh's `set -u`
        # then blew up with 'GHCR_TOKEN: unbound variable' on
        # the first attempt to use the var, and the subsequent
        # `podman pull` 401-ed with the misleading
        # 'invalid username/password' error. The appleboy
        # action's docs and reality disagree for this setup.
        #
        # Raw ssh works: the runner has GHCR_TOKEN in its env
        # (from the step-level `env:` below), and we explicitly
        # export it to the remote via `env "GHCR_TOKEN=..."` in
        # the SSH command. The value is masked by GH in the
        # log (the secret's value matches GH's masking pattern).
        # The bootstrap script is fed via stdin as a heredoc,
        # so it does not appear in `ps` or in any log; only the
        # SSH command line itself is visible, and the only
        # secret in that line is the env-var assignment, which
        # GH masks.
        #
        # Same files-as-before: pulled from raw.githubusercontent.com
        # pinned to ${{ github.sha }} so an in-flight rebuild
        # can't pick up a future install.sh change.
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail

          # Write the SSH private key to a 0600 file on the
          # runner. mktemp + trap so the key is rm'd whether the
          # step succeeds or fails.
          KEY_FILE=$(mktemp)
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$HETZNER_SSH_KEY" > "$KEY_FILE"
          chmod 0600 "$KEY_FILE"

          NEW_IP='${{ steps.create.outputs.ip }}'

          # SSH to the new VM. The bootstrap script is fed via
          # stdin; GHCR_TOKEN + GITHUB_SHA are exported on the
          # remote via `env VAR=...` so install.sh can see them.
          ssh -i "$KEY_FILE" \
              -o StrictHostKeyChecking=accept-new \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              "root@${NEW_IP}" \
              env "GHCR_TOKEN=${GHCR_TOKEN}" "GITHUB_SHA=${{ github.sha }}" \
              bash -s <<'BOOTSTRAP'
          set -euo pipefail
          mkdir -p /opt/neary-bootstrap
          cd /opt/neary-bootstrap
          BASE="https://raw.githubusercontent.com/n3ary/gtfs-publisher/${GITHUB_SHA}/apps/gtfs-rt/config"
          for f in install.sh neary-gtfs-rt.service neary-gtfs-rt-healthcheck.sh \
                   neary-gtfs-rt-healthcheck.service neary-gtfs-rt-healthcheck.timer \
                   rt.env.example; do
            curl -fsSL "$BASE/$f" -o "$f"
          done
          chmod +x install.sh neary-gtfs-rt-healthcheck.sh
          bash install.sh

          # Wait for /healthz to come up on the new VM. The
          # systemd unit pulls the image on first start, so allow
          # up to 2 minutes.
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://127.0.0.1/healthz >/dev/null 2>&1; then
              echo "ok: /healthz 200 on new VM after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "fail: /healthz never returned 200 on new VM"
          journalctl -u neary-gtfs-rt -n 50 --no-pager || true
          exit 1
          BOOTSTRAP

      - name: Swap the DNS A record
        env:
          NEW_IP: ${{ steps.create.outputs.ip }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          RECORD_ID: ${{ vars.CLOUDFLARE_GTFS_RT_A_RECORD_ID }}
        run: |
          set -euo pipefail
          : "${ZONE_ID:?CLOUDFLARE_ZONE_ID repo variable is required}"
          : "${RECORD_ID:?CLOUDFLARE_GTFS_RT_A_RECORD_ID repo variable is required}"

          echo "updating gtfs-rt.n3ary.com A record -> ${NEW_IP}"
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --arg ip "${NEW_IP}" \
              '{type:"A",name:"gtfs-rt.n3ary.com",content:$ip,proxied:true,ttl:1}')" \
            | jq -e '.success == true' >/dev/null
          echo "DNS swap complete"

      - name: Wait for CF propagation
        # CF API updates are usually instant; give it 15 s as a
        # safety margin so the next steps don't race the cache.
        run: sleep 15

      - name: Delete the old VM
        if: steps.find-active.outputs.active_id != ''
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          ACTIVE_ID: ${{ steps.find-active.outputs.active_id }}
        run: |
          set -euo pipefail
          echo "deleting old VM ${ACTIVE_ID}"
          hcloud server delete "${ACTIVE_ID}"
          echo "old VM ${ACTIVE_ID} deleted"

      - name: Cleanup any rogue VMs left behind by this run
        # The new VM is only "live" once the DNS A record points
        # at its primary IPv4. If the workflow exited before the
        # swap step ran (or the swap failed), the new VM is an
        # orphan and must be deleted so it does not pollute the
        # next run. The old VM gets re-checked here too: if the
        # "Delete the old VM" step failed for any reason, this
        # sweep removes the leftover.
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          RECORD_ID: ${{ vars.CLOUDFLARE_GTFS_RT_A_RECORD_ID }}
        run: |
          set -euo pipefail
          : "${ZONE_ID:?CLOUDFLARE_ZONE_ID repo variable is required}"
          : "${RECORD_ID:?CLOUDFLARE_GTFS_RT_A_RECORD_ID repo variable is required}"

          LIVE_IP=$(curl -fsS \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r '.result.content')
          if [ -z "$LIVE_IP" ] || [ "$LIVE_IP" = "null" ]; then
            echo "warn: CF API returned no IP for the gtfs-rt A record; skipping sweep"
            exit 0
          fi
          echo "live IP from CF A record: ${LIVE_IP}"

          ROGUE_IDS=$(hcloud server list -o json | jq -r --arg live "$LIVE_IP" \
            '[.[] | select(.name | startswith("gtfs-rt-nbg1-")) | select(.public_net.ipv4.ip != $live) | .id] | .[]')
          if [ -z "$ROGUE_IDS" ]; then
            echo "no rogue VMs to clean up"
            exit 0
          fi
          for id in $ROGUE_IDS; do
            name=$(hcloud server describe "$id" -o json | jq -r '.name')
            ip=$(hcloud server describe "$id" -o json | jq -r '.public_net.ipv4.ip')
            echo "deleting rogue VM left by this run: ${name} (id=${id}, ip=${ip}, live_ip=${LIVE_IP})"
            hcloud server delete "$id"
          done
          # The bootstrap step (install.sh) already pulled
          # ghcr.io/n3ary/gtfs-rt:latest and tagged it to
          # localhost/gtfs-rt:latest, so the new VM is already
          # running :latest. The deploy-gtfs-rt flow's pre-check,
          # backup, DNAT flush, and rollback logic don't apply to
          # a fresh VM (no existing container to back up or
          # roll back from). The next code change or manual
          # deploy will pick up any image pushed after provision.

      - name: Remove the temporary GH runner SSH rule
        # Always run, even if an earlier step failed. Identify the
        # rule by description pattern (not IP) so we don't need
        # the runner_ip output to have been written - the rule is
        # self-describing. If the allow-runner step never ran (e.g.
        # the job exited before the first network call), there is
        # no rule to remove and this step is a no-op.
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL: neary-gtfs-rt-01-edge-only
        run: |
          set -euo pipefail
          FW_ID=$(hcloud firewall describe "${FIREWALL}" -o json | jq -r '.id')
          hcloud firewall describe "${FIREWALL}" -o json > /tmp/fw_now.json

          python3 - <<'PY'
          import json, re
          with open('/tmp/fw_now.json') as f:
              d = json.load(f)
          before = len(d['rules'])
          # Match any rule whose description contains the
          # "GH Actions rebuild" marker. This catches both the
          # current run's rule and any stale rule from a previous
          # failed run that left the cleanup step itself
          # unfinished. (Defence in depth: the allow-runner step
          # is idempotent; running the workflow twice in a row
          # does not stack rules because the second run's allow
          # step reads the current state and appends again, and
          # the cleanup at the end of the second run strips BOTH
          # the current run's rule and the leftover.)
          pattern = re.compile(r"GH Actions rebuild")
          rules = [r for r in d['rules'] if not pattern.search(r.get('description', ''))]
          removed = before - len(rules)
          with open('/tmp/fw_cleaned.json', 'w') as f:
              json.dump({"rules": rules}, f)
          print(f"removed {removed} GH Actions rebuild rule(s); {len(rules)} remain")
          if removed == 0:
              # Write an empty marker so the POST still happens
              # (keeps the script logic simple); the rules array
              # is unchanged.
              pass
          PY

          curl -fsS -X POST \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/fw_cleaned.json \
            "https://api.hetzner.cloud/v1/firewalls/${FW_ID}/actions/set_rules" \
            | jq -e '.actions[0].status == "success"'
          echo "firewall cleanup complete"