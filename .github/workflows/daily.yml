name: "Daily multi-feed pipeline → R2"

# Builds outputs/ and uploads to the Cloudflare R2 bucket on success.
# Triggers: cron 00:30 UTC (after Transitous's ~00:00 UTC daily import)
# + manual workflow_dispatch.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild every feed even when upstream ETag is unchanged (use after pipeline code changes that affect output).'
        type: boolean
        default: false
  # PR merges to main also trigger a build. Combined with branch
  # protection (PR-required), this means every change goes through CI
  # before being eligible to publish.
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  packages: read  # @n3ary/* deps from GH Packages (e.g. cluj adapter)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm with GH Packages auth + install
        # Replaces the previous manual checkout+node+pnpm+HOME-scoped
        # .npmrc+pnpm install. The cluj adapter's `clujStaticExtension`
        # is a published @n3ary/* dep; pnpm reads auth from ~/.npmrc.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v13
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: pnpm build

      - name: Run pipeline
        run: pnpm pipeline
        env:
          STRICT: 'true'
          FORCE_REBUILD: ${{ inputs.force && 'true' || '' }}
          # Pipeline reads previous feeds.json from the live public URL
          # to derive per-feed upstream_etag for the skip-on-unchanged
          # path. Same host it publishes to below.
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          # Per-feed secrets. Each adapter-driven feed declares its
          # needed env vars in feeds/<id>/config.json's `secrets[]`;
          # the orchestrator forwards each name's value to the
          # adapter's ingestBuild as part of a generic secrets map.
          # Add a new env line here whenever a new feed's adapter
          # requires a new secret.
          TRANZY_API_KEY: ${{ secrets.TRANZY_API_KEY }}

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 uses SigV4 without a specific region; "auto" is
          # Cloudflare's convention. Payload signing must be enabled
          # (aws-cli v2 does this by default for s3 cp).
          ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          set -euo pipefail

          # 0. Preflight: pipeline must have produced feeds.json.
          #    Catches earlier silent failures (e.g. a misnamed pnpm filter
          #    that exits 0 with "No projects matched") that pnpm itself
          #    would not surface as a non-zero exit. Hard-fail here with a
          #    clear message rather than letting `aws s3 cp` fail later
          #    with an opaque "path does not exist".
          OUTPUTS=packages/gtfs-static/outputs
          if [ ! -s "$OUTPUTS/feeds.json" ]; then
            echo "::error::feeds.json missing or empty at $OUTPUTS/feeds.json — 'Run pipeline' produced no output." >&2
            ls -la "$OUTPUTS" 2>/dev/null || echo "(directory $OUTPUTS does not exist)" >&2
            exit 1
          fi

          # 1. Upload sqlite files BEFORE feeds.json.
          #    Order matters: if the job crashes between steps, clients
          #    keep seeing the previous feeds.json — which references
          #    previous sqlite objects still in the bucket — rather than
          #    a new feeds.json pointing at objects that haven't landed.
          #
          #    Cache-Control is 1 year + immutable because sqlite + zip
          #    filenames embed the sha256 (content-addressed URL). A
          #    content change always yields a new filename, so any
          #    cached copy at an old URL is by construction still
          #    correct for that URL. Cloudflare's edge default TTL for
          #    the `.gz` extension may still apply to the response
          #    header seen by clients (~4h), but that's irrelevant —
          #    the URL never serves different bytes.
          #
          #    Both .sqlite3.gz and .gtfs.zip are uploaded from the
          #    same content-addressed pool. Each is named
          #    `<id>-<hash12>.<ext>` so the same URL never serves
          #    different bytes.
          shopt -s nullglob
          for f in packages/gtfs-static/outputs/*.sqlite3.gz packages/gtfs-static/outputs/*.gtfs.zip; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            echo "[publish] uploading $name ($(du -h "$f" | cut -f1))"
            aws s3 cp "$f" "s3://$BUCKET/$name" \
              --endpoint-url "$ENDPOINT" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "application/octet-stream"
          done

          # 2. Upload feeds.json last — the "commit" that flips clients
          #    over to any new sqlite + zip objects uploaded above.
          echo "[publish] uploading feeds.json"
          aws s3 cp packages/gtfs-static/outputs/feeds.json "s3://$BUCKET/feeds.json" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"

          # 3. Prune EVERY orphan the new feeds.json doesn't reference.
          #    Mandatory hygiene: after each publish the bucket must
          #    contain only feeds.json + each referenced <id>.sqlite3.gz
          #    + each referenced <id>.gtfs.zip. Anything else (renamed
          #    feeds, test probes, prior-schema layouts) gets removed
          #    here so the bucket never accretes. Single source of
          #    truth: feeds.json files.{sqlite_gz, gtfs_zip}.
          #
          #    Two subtle jq traps fixed here (would otherwise 500
          #    the pipeline):
          #      a) Wrap the RHS stream in `[...]` so the `+` operator
          #         concatenates two ARRAYS. Without the wrap, `+`
          #         materialises the RHS as a single value when the
          #         stream has only one element, blowing up with
          #         "array ([\"feeds.json\"]) and string (\"cluj-napoc-...\")
          #         cannot be added".
          #      b) Use `(.a, .b)` (commas — produces a stream of
          #         values) not `[.a, .b]` (an array possibly
          #         containing null). The reused-feed path leaves
          #         `gtfs_zip: null` when no new zip was produced;
          #         `[null, "x"] | select(.)[]` keeps the null in
          #         the stream (select is a no-op at array-index
          #         level). `(.a, .b) | select(.)` filters nulls
          #         before they're collected.
          EXPECTED=$(jq -r '["feeds.json"] + [.feeds[].files | (.sqlite_gz, .gtfs_zip) | select(.)] | .[]' packages/gtfs-static/outputs/feeds.json | sort -u)
          aws s3 ls "s3://$BUCKET/" --endpoint-url "$ENDPOINT" \
            | awk '{print $4}' \
            | while read -r name; do
                [ -z "$name" ] && continue
                if ! printf '%s\n' "$EXPECTED" | grep -qxF "$name"; then
                  echo "[publish] pruning orphan: $name"
                  aws s3 rm "s3://$BUCKET/$name" --endpoint-url "$ENDPOINT"
                fi
              done