name: PR Validation

on:
  pull_request:
    branches: [main]

# Ensure the PR is up-to-date before merging (protects version sequencing).
# GitHub branch protection "Require branches to be up to date" enforces this
# at the merge button level; this workflow re-validates on every push.

permissions:
  contents: write  # needed by the version-bump action to push the bot commit

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-bump version to main + 1
        uses: ciotlosm/neary-shared/.github/actions/version-bump@v1
        with:
          # Skip the bump when the PR touches only docs/, .github/,
          # .gitignore, or LICENSE. (default already covers .github/,
          # .gitignore, LICENSE; explicitly including docs/ to match
          # this repo's pipeline paths-ignore semantics).
          bump-skip-paths: 'docs/,.github/,.gitignore,LICENSE'

      - name: Run tests
        run: npm test

      - name: Skip heavy checks for metadata-only changes
        id: skip-heavy
        # Skip the full pipeline (which fetches upstream sources and is
        # the slowest step at ~7-10 min) when the PR only changes
        # metadata. Tests still run above, and the version-bump
        # action also skips itself for the same paths. Same paths as
        # `paths-ignore` on the daily.yml workflow.
        # GITHUB_OUTPUT format requires `key=value` per line, no newlines.
        # Each path is matched as a prefix (any depth under docs/, .github/,
        # outputs/), not as an exact filename match — the previous regex
        # only matched files DIRECTLY under those dirs, missing
        # docs/standards/version-management.md.
        run: |
          NON_META=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|.github/*|.gitignore|LICENSE|outputs/*) : ;;  # metadata
              *) NON_META="$NON_META $f" ;;
            esac
          done < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if [ -z "$NON_META" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=metadata-only diff" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "reason=non-metadata: $NON_META" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline (smoke check)
        if: steps.skip-heavy.outputs.skip != 'true'
        # Don't actually publish — `SKIP_PUBLISH=1` makes the pipeline
        # produce outputs/feeds.json + outputs/*.sqlite3.gz without
        # uploading to R2.
        run: SKIP_PUBLISH=1 npm run pipeline