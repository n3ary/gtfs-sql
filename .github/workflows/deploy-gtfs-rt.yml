name: '[deploy] gtfs-rt to Hetzner (on build complete + manual)'

# Auto-deploy when the Build workflow finishes on main. Manual
# dispatch for ad-hoc deploys / rollbacks.
#
# Requires:
#   Secrets: HETZNER_SSH_KEY, GHCR_TOKEN, CLOUDFLARE_API_TOKEN
#   Variables: CLOUDFLARE_ZONE_ID, CLOUDFLARE_GTFS_RT_A_RECORD_ID

on:
  workflow_run:
    workflows: ["Build ghcr.io/n3ary/gtfs-rt"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest).'
        required: false
        default: 'latest'

env:
  HETZNER_SSH_USER: root

concurrency:
  group: deploy-gtfs-rt
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Allow this GH runner's IP on the firewall (temporary)
        # Same pattern as rebuild-gtfs-rt-vm: the base firewall
        # only allows SSH from the operator's home IP. The GH
        # runner's egress IP is different and changes per job.
        # Add a narrow /32 rule for the current run, do the
        # deploy, then strip the rule in the cleanup step below.
        # Description embeds github.run_id for self-identification.
        id: allow-runner
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL: neary-gtfs-rt-01-edge-only
        run: |
          set -euo pipefail
          IP1=$(curl -fsS --max-time 5 https://api.ipify.org || echo "")
          IP2=$(curl -fsS --max-time 5 https://ifconfig.me || echo "")
          if [ -z "$IP1" ] || [ -z "$IP2" ] || [ "$IP1" != "$IP2" ]; then
            echo "::error::could not reliably detect GH runner egress IP (ipify='$IP1' ifconfig='$IP2'); aborting to keep the firewall locked"
            exit 1
          fi
          RUNNER_IP="$IP1"
          echo "detected runner egress IP: ${RUNNER_IP}"

          FW_ID=$(hcloud firewall describe "${FIREWALL}" -o json | jq -r '.id')
          hcloud firewall describe "${FIREWALL}" -o json > /tmp/fw_before.json

          RUN_DESC="SSH: GH Actions deploy (run ${{ github.run_id }})"
          python3 - <<PY
          import json
          with open('/tmp/fw_before.json') as f:
              d = json.load(f)
          rules = d['rules']
          rules.append({
              "description": "${RUN_DESC}",
              "direction": "in",
              "port": "22",
              "protocol": "tcp",
              "destination_ips": [],
              "source_ips": ["${RUNNER_IP}/32"],
          })
          with open('/tmp/fw_after.json', 'w') as f:
              json.dump({"rules": rules}, f)
          print(f"appended 1 rule; total now {len(rules)}")
          PY

          curl -fsS -X POST \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/fw_after.json \
            "https://api.hetzner.cloud/v1/firewalls/${FW_ID}/actions/set_rules" \
            | jq -e '.actions[0].status == "success"'
          echo "firewall now allows SSH from ${RUNNER_IP}/32 for the duration of this run"

      - name: Resolve origin IP via CF API
        # gtfs-rt.n3ary.com is CF-proxied; DNS returns a CF edge IP
        # that does not forward port 22. Read the A-record content
        # (= the current Hetzner VM IP) over CF's REST API instead;
        # rebuild-gtfs-rt-vm updates the same record on every VM
        # swap, so this stays self-healing across rebuilds.
        id: resolve-host
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          RECORD_ID: ${{ vars.CLOUDFLARE_GTFS_RT_A_RECORD_ID }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/zones/{os.environ['ZONE_ID']}/dns_records/{os.environ['RECORD_ID']}",
              headers={
                  "Authorization": f"Bearer {os.environ['CF_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )
          data = json.load(urllib.request.urlopen(req))
          if not data.get("success"):
              raise SystemExit(f"CF API failed: {data.get('errors')}")
          ip = data["result"]["content"]
          octets = ip.split(".")
          if len(octets) != 4 or not all(0 <= int(o) <= 255 for o in octets):
              raise SystemExit(f"resolved IP '{ip}' is not an IPv4 literal")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ip={ip}\n")
          print(f"origin IP for gtfs-rt.n3ary.com: {ip}")
          PY

      - name: Deploy (pre-check, backup, pull, restart, healthcheck, rollback)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ steps.resolve-host.outputs.ip }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -euo pipefail
            TAG='${{ github.event.inputs.image_tag || 'latest' }}'
            LOG() { printf '[%s] %s\n' "$(date -u +%FT%TZ)" "$*"; }
            FAIL() { LOG "FAIL: $*"; exit 1; }
            ROLLBACK_DONE=0
            trap 'rc=$?; if [ "$rc" -ne 0 ] && [ "$ROLLBACK_DONE" = "1" ]; then LOG "deploy failed; rollback already applied"; fi' EXIT

            LOG "deploying ghcr.io/n3ary/gtfs-rt:${TAG} to $(hostname) ($(hostname -i))"

            # Flush stale podman DNAT rules before touching containers.
            # podman rm -f doesn't always clean 'nv_*_dnat' chains;
            # rules from dead container IPs accumulate across cycles on
            # a single VM, and the chain's first-match DNAT then points
            # at a dead IP - so curl http://127.0.0.1/healthz times out
            # even when the new container is healthy inside its netns.
            # `nft delete` is idempotent; podman/netavark rebuilds the
            # table on the next container creation.
            nft delete table inet netavark 2>/dev/null || true

            # Log in to ghcr.io so podman can pull.
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "${GHCR_TOKEN}" | podman login ghcr.io -u ciotlosm --password-stdin >/dev/null
            fi

            # Pre-check: is the current container healthy?
            # We use podman's State.Healthcheck.Status when present,
            # otherwise fall back to curl /healthz.
            PROBE() {
              local status
              status=$(podman inspect neary-gtfs-rt \
                --format '{{.State.Healthcheck.Status}}' 2>/dev/null \
                || echo none)
              case "$status" in
                healthy) echo healthy; return 0;;
                unhealthy|starting|none|"")
                  if curl -fsS --max-time 2 http://127.0.0.1/healthz >/dev/null 2>&1; then
                    echo "healthz-ok"; return 0
                  fi
                  if ! podman container exists neary-gtfs-rt 2>/dev/null; then
                    echo down; return 0
                  fi
                  echo unhealthy; return 0;;
              esac
            }

            PREV_STATE=$(PROBE)
            LOG "pre-check: previous container state = ${PREV_STATE}"
            case "$PREV_STATE" in
              healthy|healthz-ok) PREV_HEALTHY=1;;
              *)                  PREV_HEALTHY=0;;
            esac

            # Backup: snapshot the current image as previous-<12hex>.
            # Only when the current container was healthy - never
            # back up a known-bad image.
            BACKUP_TAG=""
            if [ "$PREV_HEALTHY" = "1" ]; then
              CURRENT_SHA=$(podman inspect localhost/gtfs-rt:latest \
                --format '{{.Id}}' 2>/dev/null \
                | sed 's/^sha256://' | cut -c1-12 || echo "")
              if [ -n "$CURRENT_SHA" ]; then
                BACKUP_TAG="localhost/gtfs-rt:previous-${CURRENT_SHA}"
                podman tag localhost/gtfs-rt:latest "$BACKUP_TAG"
                LOG "backup created: ${BACKUP_TAG}"
              fi
            else
              LOG "previous container was not healthy; skipping backup"
            fi

            # Pull the new image, retag locally (the systemd unit
            # references localhost/gtfs-rt:latest), and restart.
            LOG "pulling ghcr.io/n3ary/gtfs-rt:${TAG}"
            podman pull "ghcr.io/n3ary/gtfs-rt:${TAG}"
            podman tag "ghcr.io/n3ary/gtfs-rt:${TAG}" localhost/gtfs-rt:latest
            LOG "restarting neary-gtfs-rt"
            systemctl restart neary-gtfs-rt

            # Wait for the new container to become healthy. 90 s
            # total budget: start-period=10 s in the image
            # HEALTHCHECK plus retries at 3 s intervals.
            NEW_HEALTHY=0
            for i in $(seq 1 30); do
              sleep 3
              NEW_STATE=$(PROBE)
              case "$NEW_STATE" in
                healthy|healthz-ok)
                  LOG "container healthcheck ok after ${i} probes (state=${NEW_STATE})"
                  NEW_HEALTHY=1
                  break;;
                *) LOG "probe ${i}: state=${NEW_STATE}";;
              esac
            done

            if [ "$NEW_HEALTHY" = "1" ]; then
              LOG "deploy finished ok at $(date -u +%FT%TZ)"
              exit 0
            fi

            LOG "FAIL: new container did not become healthy in 90 s"
            journalctl -u neary-gtfs-rt -n 40 --no-pager || true

            # Roll back if the pre-check was healthy (so we have
            # a backup) and the backup is different from the broken
            # image. The pipeline still exits 1 so the operator
            # notices.
            if [ -n "$BACKUP_TAG" ]; then
              LOG "rolling back to ${BACKUP_TAG}"
              podman tag "$BACKUP_TAG" localhost/gtfs-rt:latest
              systemctl restart neary-gtfs-rt
              ROLLBACK_DONE=1
              for i in $(seq 1 10); do
                sleep 3
                ROLL_STATE=$(PROBE)
                case "$ROLL_STATE" in
                  healthy|healthz-ok)
                    LOG "rollback ok: state=${ROLL_STATE} after ${i} probes"
                    FAIL "deploy of ${TAG} failed; rolled back to ${BACKUP_TAG}";;
                esac
              done
              FAIL "deploy of ${TAG} failed; rollback to ${BACKUP_TAG} also unhealthy"
            fi

            FAIL "deploy of ${TAG} failed; no backup available (previous was already unhealthy)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Remove the temporary GH runner SSH rule
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL: neary-gtfs-rt-01-edge-only
        run: |
          set -euo pipefail
          FW_ID=$(hcloud firewall describe "${FIREWALL}" -o json | jq -r '.id')
          hcloud firewall describe "${FIREWALL}" -o json > /tmp/fw_now.json

          python3 - <<'PY'
          import json, re
          with open('/tmp/fw_now.json') as f:
              d = json.load(f)
          before = len(d['rules'])
          # Match any rule whose description contains the
          # "GH Actions" marker. Strip both deploy and rebuild
          # leftovers in one sweep (defence in depth: the deploy
          # workflow can also clean up after a half-finished
          # rebuild that left its rule behind).
          pattern = re.compile(r"GH Actions (deploy|rebuild)")
          rules = [r for r in d['rules'] if not pattern.search(r.get('description', ''))]
          removed = before - len(rules)
          with open('/tmp/fw_cleaned.json', 'w') as f:
              json.dump({"rules": rules}, f)
          print(f"removed {removed} GH Actions rule(s); {len(rules)} remain")
          PY

          curl -fsS -X POST \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/fw_cleaned.json \
            "https://api.hetzner.cloud/v1/firewalls/${FW_ID}/actions/set_rules" \
            | jq -e '.actions[0].status == "success"'
          echo "firewall cleanup complete"
