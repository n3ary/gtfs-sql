packages:
  - "apps/*"
  - "libs/*"

# Force every transitive @n3ary/gtfs-spec dep to resolve to this
# workspace's local checkout (link:../libs/spec) instead of fetching
# the published GH Packages tarball. Without this, downstream packages
# like @n3ary/gtfs-adapter-cluj-napoca@0.2.0 (which declares
# "@n3ary/gtfs-spec": "^0.3.2" as a production dep) trigger a 401
# when CI tries to read the org's private spec package. Single source
# of truth: workspace-only.
#
# `link:../libs/spec` (the same target resolved inside the workspace's
# importer entries) is used in preference to `workspace:*` because
# the latter caused pnpm 11.5 to also downgrade Vite (vitest@4.1.9's
# peer fell back to vite@5.4.21 instead of vite@8.x). `link:` is the
# most-specific syntax — it doesn't trigger the cross-package
# resolution path that perturbates vitest's peer resolution.
overrides:
  '@n3ary/gtfs-spec': workspace:*

allowBuilds:
  better-sqlite3: true
  esbuild: true
  protobufjs: true
  sharp: true
  workerd: true

# pnpm 11 supply-chain policy rejects packages published within the
# minimum release age cutoff (default 24h). Disable for this
# internal monorepo: every @n3ary dep is published by us and we
# trust our own publish pipeline. (Minutes; 0 = no cutoff.)
minimumReleaseAge: 0

# pnpm 11 has a SEPARATE tarball-hash check that runs even when
# minimumReleaseAge is 0: `pnpm install` re-fetches each internal
# dep's tarball and verifies its sha512 against what the registry
# serves now. After a fresh publish (CI re-builds the lockfile +
# GH Packages re-signs the tarball), the two can disagree for ~5
# minutes and produce `ERR_PNPM_TARBALL_URL_MISMATCH` in CI even
# though locally everything works.
#
# `trustPolicy: off` means "use the lockfile hashes as the
# source of truth, don't re-verify against the live registry" —
# same intent as `--trust-lockfile` on the CLI but persistent
# across every `pnpm install` in every workflow. The lockfile is
# part of the source tree and goes through PR review, so its
# hashes are already trusted. This eliminates the post-publish
# cache-lag failure mode without weakening security (an attacker
# who can rewrite the lockfile can already rewrite the code).
trustPolicy: off
