name: "Daily multi-feed pipeline → R2"

# Builds outputs/ and uploads to the Cloudflare R2 bucket on success.
# Triggers: cron 00:30 UTC (after Transitous's ~00:00 UTC daily import)
# + manual workflow_dispatch.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild every feed even when upstream ETag is unchanged (use after pipeline code changes that affect output).'
        type: boolean
        default: false
  # PR merges to main also trigger a build. Combined with branch
  # protection (PR-required), this means every change goes through CI
  # before being eligible to publish.
  push:
    branches:
      - main
    paths-ignore:
      # Docs-only changes (any README, anywhere) don't need a rebuild.
      # Force a build by including a non-md change in the PR.
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: node src/pipeline/build-all.js
        env:
          STRICT: 'true'
          FORCE_REBUILD: ${{ inputs.force && 'true' || '' }}
          # Pipeline reads previous feeds.json from the live public URL
          # to derive per-feed upstream_etag for the skip-on-unchanged
          # path. Same host it publishes to below.
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 uses SigV4 without a specific region; "auto" is
          # Cloudflare's convention. Payload signing must be enabled
          # (aws-cli v2 does this by default for s3 cp).
          ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          set -euo pipefail

          # 1. Upload sqlite files BEFORE feeds.json.
          #    Order matters: if the job crashes between steps, clients
          #    keep seeing the previous feeds.json — which references
          #    previous sqlite objects still in the bucket — rather than
          #    a new feeds.json pointing at objects that haven't landed.
          #
          #    Cache-Control is 1 year + immutable because sqlite
          #    filenames embed the sha256 (content-addressed URL). A
          #    content change always yields a new filename, so any
          #    cached copy at an old URL is by construction still
          #    correct for that URL. Cloudflare's edge default TTL for
          #    the `.gz` extension may still apply to the response
          #    header seen by clients (~4h), but that's irrelevant —
          #    the URL never serves different bytes.
          shopt -s nullglob
          for f in outputs/*.sqlite3.gz; do
            name=$(basename "$f")
            echo "[publish] uploading $name ($(du -h "$f" | cut -f1))"
            aws s3 cp "$f" "s3://$BUCKET/$name" \
              --endpoint-url "$ENDPOINT" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "application/octet-stream"
          done

          # 2. Upload feeds.json last — the "commit" that flips clients
          #    over to any new sqlite objects uploaded above.
          echo "[publish] uploading feeds.json"
          aws s3 cp outputs/feeds.json "s3://$BUCKET/feeds.json" \
            --endpoint-url "$ENDPOINT" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"

          # 3. Prune EVERY orphan the new feeds.json doesn't reference.
          #    Mandatory hygiene: after each publish the bucket must
          #    contain only feeds.json + each referenced <id>.sqlite3.gz.
          #    Anything else (renamed feeds, test probes, prior-schema
          #    layouts) gets removed here so the bucket never accretes.
          #    Single source of truth: feeds.json files.sqlite_gz.
          EXPECTED=$(jq -r '["feeds.json"] + [.feeds[].files.sqlite_gz | select(.)] | .[]' outputs/feeds.json | sort -u)
          aws s3 ls "s3://$BUCKET/" --endpoint-url "$ENDPOINT" \
            | awk '{print $4}' \
            | while read -r name; do
                [ -z "$name" ] && continue
                if ! printf '%s\n' "$EXPECTED" | grep -qxF "$name"; then
                  echo "[publish] pruning orphan: $name"
                  aws s3 rm "s3://$BUCKET/$name" --endpoint-url "$ENDPOINT"
                fi
              done
