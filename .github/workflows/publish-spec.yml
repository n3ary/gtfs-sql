name: Publish @n3ary/gtfs-spec

# Publishes packages/spec to GitHub Packages (https://npm.pkg.github.com/).
#
# Triggers:
#   - workflow_dispatch with a `version` input (e.g. "0.1.0", "0.2.0-rc.1").
#     Bumps packages/spec/package.json, commits, tags, publishes.
#   - push of a tag matching packages/spec/v* — publish that exact version.
#
# The package is PUBLIC on GitHub Packages (set via `access: public` in
# packages/spec/package.json#publishConfig at first publish). To make
# it private after the initial publish, edit the `access` field in
# publishConfig and re-run.
#
# Authentication: GITHUB_TOKEN with `packages: write` (default in this
# workflow file). No additional secrets required.
#
# Consumers (neary, cluj) add this to their .npmrc:
#   @n3ary:registry=https://npm.pkg.github.com
# then `npm install @n3ary/gtfs-spec` works.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Blank uses current.'
        required: false
        type: string
  push:
    tags:
      - 'packages/spec/v*'

permissions:
  contents: write   # for the version-bump + tag-push path
  packages: write   # for npm publish
  id-token: write   # for npm publish --provenance (OIDC token from Actions)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm with GH Packages auth + install
        # The workspace's pnpm-lock.yaml references
        # @n3ary/gtfs-adapter-cluj-napoca (a private package on GH
        # Packages) as a dev-dep of the gtfs-static package. pnpm reads
        # auth from ~/.npmrc; without it, `pnpm install` 401s on that
        # tarball.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v13
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: pnpm build

      - name: Test packages
        run: pnpm test

      - name: Set version
        id: set-version
        # workflow_dispatch + version input -> bump package.json + tag.
        # Tag push -> use the version already in the tag.
        # No version input -> publish whatever is in package.json.
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.version != ''
        uses: n3ary/actions/.github/actions/version-bump@v12
          with:
        with:
          version-input: ${{ github.event.inputs.version }}
          package-dir: packages/spec
          tag-name: packages/spec/v{version}
          commit-message-override: 'chore(release): @n3ary/gtfs-spec v{version}'

      - name: Publish to GitHub Packages
        # Always builds the latest spec/ contents and publishes. The
        # version field is whatever's in packages/spec/package.json at
        # this point (either pre-existing or just bumped above).
        #
        # Set HOME to a clean temp dir so the .npmrc we write below is
        # the ONLY npmrc on the PATH for this run. Without this, the
        # runner's pre-existing ~/.npmrc (if any) can shadow our
        # project .npmrc and cause ENEEDAUTH.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: ${{ runner.temp }}/publish-spec-clean-home
        run: |
          mkdir -p "$HOME"
          # npm reads auth from ~/.npmrc, not from NODE_AUTH_TOKEN env
          # var, by default. Write a HOME-scoped .npmrc that maps
          # the @n3ary scope to GitHub Packages and supplies the token
          # inline. Scoped to the run temp dir so it doesn't leak
          # into the global ~/.npmrc on the runner.
          #
          # Note: heredoc is unquoted (no 'EOF') so ${NODE_AUTH_TOKEN}
          # gets expanded by the shell. Quoted heredocs ('EOF') would
          # leave the literal string in the file and npm would reject
          # the auth.
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          # npm publish with --provenance attaches an SLSA provenance
          # attestation linking the published artifact to this workflow
          # run. Visible in the package's "Attestations" tab.
          cd packages/spec
          npm publish --provenance --access public
        # No-op when this is a tag-push of a version already published.
        continue-on-error: false