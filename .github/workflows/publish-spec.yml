name: Publish @n3ary/gtfs-spec

# Publishes packages/spec to GitHub Packages (https://npm.pkg.github.com/).
#
# Trigger: a PR is merged that touches packages/spec/package.json. The
# version bump happens inside the PR (via version-bump auto-bump in
# pr-validation.yml, or manually), so by the time this workflow fires
# the new version is already on main -- no separate version-bump,
# tag-push, or release-branch needed here. publish-spec just builds
# the merged code and publishes.
#
# The package is PUBLIC on GitHub Packages (set via `access: public`
# in packages/spec/package.json#publishConfig at first publish). To
# make it private after the initial publish, edit the `access` field
# in publishConfig and re-run.
#
# Authentication: GITHUB_TOKEN with `packages: write` for npm publish.
# NPM_TOKEN for pnpm install (to read private @n3ary/* deps).
#
# Consumers (neary, cluj) add this to their .npmrc:
#   @n3ary:registry=https://npm.pkg.github.com
# then `npm install @n3ary/gtfs-spec` works.

on:
  pull_request:
    types: [closed]
    paths:
      - 'packages/spec/package.json'

# pull_request_target runs in the base branch's context so secrets
# (NPM_TOKEN, etc.) are available even if the PR is from a fork.
# Safe here because this workflow only checks out main, not the PR's
# untrusted code.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    # Only run when the PR was actually merged (not just closed).
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        # Check out main (not the PR's HEAD ref) so the publish job
        # uses the merged code. `fetch-depth: 0` so any downstream
        # tag-related steps have full history.
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm with GH Packages auth + install
        # The workspace's pnpm-lock.yaml references
        # @n3ary/gtfs-adapter-cluj-napoca (a private package on GH
        # Packages) as a dev-dep of the gtfs-static package. pnpm reads
        # auth from ~/.npmrc; without it, `pnpm install` 401s on that
        # tarball.
        uses: n3ary/actions/.github/actions/setup-pnpm-gh-packages-auth@v14
        with:
          auth-token: ${{ secrets.NPM_TOKEN }}

      - name: Build packages
        run: pnpm build

      - name: Test packages
        run: pnpm test

      - name: Publish to GitHub Packages
        # Set HOME to a clean temp dir so the .npmrc we write below is
        # the ONLY npmrc on the PATH for this run. Without this, the
        # runner's pre-existing ~/.npmrc (if any) can shadow our
        # project .npmrc and cause ENEEDAUTH.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOME: ${{ runner.temp }}/publish-spec-clean-home
        run: |
          mkdir -p "$HOME"
          # npm reads auth from ~/.npmrc, not from NODE_AUTH_TOKEN env
          # var, by default. Write a HOME-scoped .npmrc that maps
          # the @n3ary scope to GitHub Packages and supplies the token
          # inline. Scoped to the run temp dir so it doesn't leak
          # into the global ~/.npmrc on the runner.
          #
          # Note: heredoc is unquoted (no 'EOF') so ${NODE_AUTH_TOKEN}
          # gets expanded by the shell. Quoted heredocs ('EOF') would
          # leave the literal string in the file and npm would reject
          # the auth.
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          # npm publish with --provenance attaches an SLSA provenance
          # attestation linking the published artifact to this workflow
          # run. Visible in the package's "Attestations" tab.
          cd packages/spec
          npm publish --provenance --access public