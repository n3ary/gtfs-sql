name: PR Validation

on:
  pull_request:
    branches: [main]

# Shared base PR-validation lives in n3ary/actions. Repo-specific
# jobs (build, version-bump, pipeline smoke) stay local because they
# need repo secrets (NPM_TOKEN, TRANZY_API_KEY) and the full pipeline
# runner.

permissions:
  contents: write  # needed by the version-bump action to push the bot commit
  packages: read   # needed to install @n3ary/* deps from GH Packages

jobs:
  shared:
    uses: n3ary/actions/.github/workflows/pr-validation.yml@v1

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Install dependencies
        # --trust-lockfile: the lockfile is part of the source tree and
        # goes through PR review. We don't need pnpm 11's supply-chain
        # re-verification step (which can reject fresh publishes within
        # 24h of their release) blocking CI for lockfile-only diffs.
        #
        # NODE_AUTH_TOKEN gets baked into a HOME-scoped .npmrc so pnpm
        # can fetch @n3ary/* deps published to GH Packages (e.g.
        # @n3ary/gtfs-adapter-cluj-napoca). The repo's committed .npmrc
        # only declares scope mapping; token wiring is here.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOME: ${{ runner.temp }}/gtfs-publisher-pr-clean-home
        run: |
          mkdir -p "$HOME"
          {
            echo "@n3ary:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "$HOME/.npmrc"
          pnpm install --frozen-lockfile --trust-lockfile

      - name: Build packages
        run: pnpm build

      - name: Auto-bump version to main + 1
        uses: n3ary/actions/.github/actions/version-bump@v1
        with:
          # Skip the bump when the PR touches only docs/, .github/,
          # .gitignore, or LICENSE. (default already covers .github/,
          # .gitignore, LICENSE; explicitly including docs/ to match
          # this repo's pipeline paths-ignore semantics).
          bump-skip-paths: 'docs/,.github/,.gitignore,LICENSE'

      - name: Run tests
        run: pnpm test

      - name: Skip heavy checks for metadata-only changes
        id: skip-heavy
        # Skip the full pipeline (which fetches upstream sources and is
        # the slowest step at ~7-10 min) when the PR only changes
        # metadata. Tests still run above, and the version-bump
        # action also skips itself for the same paths. Same paths as
        # `paths-ignore` on the daily.yml workflow.
        run: |
          NON_META=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*|.github/*|.gitignore|LICENSE|outputs/*) : ;;
              packages/*/outputs/*|pnpm-lock.yaml|tsconfig*.json) : ;;
              packages/*/tsconfig.json) : ;;
              *) NON_META="$NON_META $f" ;;
            esac
          done < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if [ -z "$NON_META" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=metadata-only diff" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "reason=non-metadata: $NON_META" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline (smoke check)
        if: steps.skip-heavy.outputs.skip != 'true'
        # Don't actually publish - `SKIP_PUBLISH=1` makes the pipeline
        # produce outputs/feeds.json + outputs/*.sqlite3.gz +
        # outputs/*.gtfs.zip without uploading to R2.
        #
        # Per-feed adapter secrets are declared in feeds/<id>/config.json
        # under `secrets[]`. When ANY of them is unavailable on PR forks,
        # `SKIP_ADAPTER_DRY_RUN=1` short-circuits the per-feed adapter
        # call and substitutes a tiny synthetic GTFS zip so the rest of
        # the pipeline (sqlite build, feeds.json emit, prune list) still
        # exercises end-to-end with zero external HTTP - true dry mode,
        # not fail-open. Today only TRANZY_API_KEY is in play (the
        # cluj adapter's only required secret); the conditional flips
        # dry-mode on if it is absent.
        env:
          TRANZY_API_KEY: ${{ secrets.TRANZY_API_KEY || '' }}
          SKIP_ADAPTER_DRY_RUN: ${{ secrets.TRANZY_API_KEY == '' && '1' || '' }}
        run: |
          if [ -n "${TRANZY_API_KEY:-}" ]; then
            echo "[ci] feed secrets present - running full pipeline."
            STRICT=false SKIP_PUBLISH=1 pnpm pipeline
          else
            echo "[ci] feed secrets unavailable - using SKIP_ADAPTER_DRY_RUN=1."
            echo "[ci] (no external HTTP, synthetic GTFS zip substituted)"
            STRICT=false SKIP_PUBLISH=1 SKIP_ADAPTER_DRY_RUN=1 pnpm pipeline
          fi