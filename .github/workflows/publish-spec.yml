# Publishes libs/spec to GitHub Packages (https://npm.pkg.github.com/).
#
# Trigger: a PR is merged that touches libs/spec/package.json.
# The version bump happens inside the PR (via version-bump auto-bump
# in pr-validation.yml, or manually), so by the time this workflow
# fires the new version is already on main -- no separate version-bump,
# tag-push, or release-branch needed here. publish-spec just checks
# out main, calls package/publish, and lets it do everything else.
#
# The package is PUBLIC on GitHub Packages (set via `access: public`
# in libs/spec/package.json#publishConfig at first publish). To
# make it private after the initial publish, edit the `access` field
# in publishConfig and re-run.
#
# Authentication: GITHUB_TOKEN with `packages: write` for npm publish.
# NPM_TOKEN for pnpm install (to read private @n3ary/* deps).
#
# Consumers (neary, cluj) add this to their .npmrc:
#   @n3ary:registry=https://npm.pkg.github.com
# then `npm install @n3ary/gtfs-spec` works.

on:
  pull_request:
    types: [closed]
    paths:
      - 'libs/spec/package.json'

# pull_request_target runs in the base branch's context so secrets
# (NPM_TOKEN, etc.) are available even if the PR is from a fork.
# Safe here because this workflow only checks out main, not the PR's
# untrusted code.
permissions:
  contents: write   # for the tag push inside package/publish
  packages: write   # for npm publish (via package/publish)
  id-token: write   # for npm publish --provenance (via package/publish)

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Publish @n3ary/gtfs-spec
        uses: n3ary/actions/.github/actions/package/publish@v21
        with:
          package-dir: libs/spec
          tag-template: 'libs/spec/v{version}'
          access: public
          provenance: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          npm-token: ${{ secrets.NPM_TOKEN }}
