name: '[ops] gtfs-rt VM recovery (on issue + manual)'

# Triggered by the uptime monitor's incident issue (label
# `vm-restart-pending`) OR by manual `workflow_dispatch`. Reboots
# the live gtfs-rt VM via the Hetzner API. The systemd unit
# `neary-gtfs-rt.service` is enabled, so the container auto-
# starts on boot.
#
# Why a VM reboot (not a container restart):
#   - systemd's Restart=on-failure can get stuck in a failure loop
#     if the unit's RestartSec window is exhausted
#   - the systemd unit itself can be masked/disabled by manual
#     intervention or a bad install.sh run
#   - the kernel can hang in a way that only a hard reset fixes
#   - container-level restarts don't help with DNAT stale rules
#     (the netavark chain is host-level state)
# A VM reboot is the nuclear option that resets all host-level
# state, not just the container.
#
# Idempotency: this workflow has no-op guards. Calling it
# repeatedly on the same VM just reboots it again. Callers
# (uptime.yml) are expected to use the GH issue's open/closed
# state as the natural rate limiter.
#
# Hetzner `reboot` sends ACPI to the guest (graceful, ~30s
# downtime). `reset` is the force option (like pressing the
# reset button) - we use `reboot` to give systemd a chance to
# stop units cleanly.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why the reboot is being triggered (informational only).'
        required: false
        type: string
        default: 'manual'
  issues:
    # GH fires `issues.opened` when an issue is CREATED with a
    # label, but does NOT fire `issues.labeled` in that case -
    # `labeled` only fires when a label is added to an existing
    # issue. uptime.yml creates the issue with the label in one
    # call (`gh issue create --label vm-restart-pending`), so
    # the `labeled` event would miss the trigger. `opened`
    # catches that path; we still keep `labeled` so a re-add
    # (e.g. uptime.yml running on a degraded-then-DOWN cycle
    # where the issue was already open) also re-fires recovery.
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  recover:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'vm-restart-pending') &&
       (github.event.action == 'opened' || github.event.action == 'labeled'))
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out the repo
        # Required: `gh issue comment` runs `git` internally for branch
        # context and errors out with "not a git repository" without this.
        uses: actions/checkout@v7

      - name: Install hcloud
        run: |
          set -euo pipefail
          curl -sSLo /tmp/hcloud.tar.gz \
            https://github.com/hetznercloud/cli/releases/download/v1.49.0/hcloud-linux-amd64.tar.gz
          tar -C /tmp -xzf /tmp/hcloud.tar.gz
          mv /tmp/hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Find the live gtfs-rt VM
        id: find
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          # Use the `role=gtfs-rt` label that the rebuild-VM
          # workflow adds. Looking up by label keeps this
          # workflow stable across rebuilds (the VM ID changes
          # every time we rebuild).
          NAME=$(hcloud server list -l "role=gtfs-rt" -o noheader -o columns=name | head -1)
          if [ -z "$NAME" ]; then
            echo "::error::no VM with role=gtfs-rt label found"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "live VM: $NAME"

      - name: Reboot the VM
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          NAME='${{ steps.find.outputs.name }}'
          echo "sending ACPI reboot to $NAME"
          hcloud server reboot "$NAME"
          echo "reboot signal sent at $(date -u +%FT%TZ)"

      - name: Wait + verify
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          NAME='${{ steps.find.outputs.name }}'
          echo "VM name from find step: '$NAME'"
          if [ -z "$NAME" ]; then
            echo "::error::NAME is empty - find step did not set output"
            exit 1
          fi
          # Hetzner reboot typically takes 30-90s. Poll for the
          # VM to come back to a healthy state.
          #
          # hcloud server describe -o json returns a flat object
          # (v1.49.0); status is at the root, not .server.status.
          # Valid statuses: running, starting, stopping, off,
          # initializing, unknown (Hetzner can report 'unknown'
          # during transient states or API glitches).
          UP_STATUSES='^(running|starting|initializing)$'
          KNOWN_BAD='^(off|stopping)$'
          for i in $(seq 1 48); do
            RAW=$(hcloud server describe "$NAME" -o json 2>&1)
            STATUS=$(echo "$RAW" | jq -r '.status // "unknown"')
            echo "tick $i: status=$STATUS"
            if [[ "$STATUS" =~ $UP_STATUSES ]]; then
              echo "VM is back online (status=$STATUS)"
              break
            fi
            if [[ "$STATUS" =~ $KNOWN_BAD ]]; then
              echo "::error::VM is in a bad state: $STATUS"
              exit 1
            fi
            # unknown / anything else: keep polling, no budget consumed
            sleep 5
          done
          if [[ ! "$STATUS" =~ $UP_STATUSES ]]; then
            echo "::error::VM did not reach a healthy state within 4 minutes (last status=$STATUS)"
            exit 1
          fi
          # Give systemd a moment to finish the boot sequence
          # and the healthcheck timer its first run.
          sleep 30
          echo "VM rebooted successfully"

      - name: Comment on the issue (if any)
        if: ${{ github.event_name == 'issues' && github.event.action == 'labeled' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Best-effort comment; a failure here should not fail the job.
          # The VM has already been rebooted and verified at this point.
          set -eo pipefail
          gh issue comment '${{ github.event.issue.number }}' \
            --body "VM reboot triggered by \`recovery-gtfs-rt-vm\` at $(date -u +%FT%TZ). Reason: ${{ github.event.issue.title }}." \
            || echo "warn: could not post issue comment (git repo may be unavailable)"
