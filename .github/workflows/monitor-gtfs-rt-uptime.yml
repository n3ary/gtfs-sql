name: '[monitor] gtfs-rt uptime (on schedule + manual)'

# Probes gtfs-rt.n3ary.com every 15 minutes. Tracks failure state
# via the GH Actions run history (no external state store needed).
# On 3 consecutive failures, opens a single GH issue (idempotent -
# re-uses the same issue if one is already open). Labels the issue
# `vm-restart-pending` to trigger the recovery workflow, which
# reboots the VM via the Hetzner API. The systemd unit
# (`neary-gtfs-rt.service`) is enabled, so the container auto-
# starts on boot and the next probe flips back to healthy.
#
# What this catches: service down, container crash loop, network
# partition to the VM, Hetzner infra outage. The on-VM systemd
# timer (PR #154 era) is the first-line recovery; this monitor
# is the second-line that catches the cases the timer doesn't
# (e.g. the unit itself is masked, or systemd is wedged).
#
# What this does NOT catch: silent data corruption in the
# protobuf bytes (service returns 200, JSON is valid, but the
# poller has been returning the same data for hours). A
# thorough check would compare entity IDs between two recent
# polls; cheap to add if you've seen that mode of failure.
#
# State machine:
#   HEALTHY  -> all last 3 cron runs are success; no issue open
#   DEGRADED -> one or two of the last 3 runs are failure
#   DOWN     -> all last 3 runs are failure; issue open with
#               `vm-restart-pending` label; recovery workflow
#               has been triggered (or is running)
#   recovery -> DEGRADED -> HEALTHY once 1+ success after DOWN

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      simulate_failures:
        description: 'Skip the real probe and treat this run as a failure (for testing the issue-open path).'
        required: false
        type: boolean
        default: false
      reset_state:
        description: 'Close any open uptime issue and exit (for testing cleanup).'
        required: false
        type: boolean
        default: false
      recover_now:
        description: 'Manually trigger the recovery workflow (reboot the VM). Use only after you understand the impact.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check out the repo
        # Required: `gh issue create` runs `git` internally for branch
        # context and errors out with "not a git repository" without
        # this. Pinned to v7 to match the rest of the workflows
        # here and to skip the v4/Node-20 deprecation warning.
        uses: actions/checkout@v7

      - name: Ensure incident labels exist
        # `gh issue create --label X` fails with "label not found"
        # if X doesn't exist. Create the label on every run
        # (idempotent; `gh label create` exits non-zero if it
        # already exists, which we swallow). Cheap - one API call.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          gh label create "vm-restart-pending" \
            --description "VM reboot pending - uptime monitor detected 3 consecutive failures" \
            --color "D93F0B" 2>/dev/null || true

      - name: Reset state (workflow_dispatch only)
        if: ${{ inputs.reset_state == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ISSUE=$(gh issue list --state open --search "gtfs-rt.n3ary.com DOWN in:title" --json number --jq '.[0].number // empty')
          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" --comment "Closed by manual reset (workflow_dispatch reset_state=true)."
            echo "closed issue #$ISSUE"
          else
            echo "no open issue to close"
          fi

      - name: Skip rest if reset
        if: ${{ inputs.reset_state == 'true' }}
        run: |
          echo "reset done - exiting"
          exit 0

      - name: Probe /healthz and /feeds
        id: probe
        if: ${{ inputs.simulate_failures != 'true' && inputs.reset_state != 'true' }}
        env:
          SIMULATE_FAILURES: ${{ inputs.simulate_failures }}
          # The /feeds JSON validator lives inline as a YAML
          # literal block (rather than a heredoc) so the YAML
          # parser doesn't have to deal with `<<PY`. The run
          # below passes it to `python3 -c` via shell variable
          # expansion - the inner double-quotes are preserved
          # (the outer ones are shell quoting, gone at
          # expansion time). Same trick for any non-trivial
          # Python embedded in a workflow run.
          #
          # /feeds returns {"feeds": [{...}, ...]} per
          # server.ts, NOT a raw array. The validator walks
          # into data['feeds'] before the rest of the checks.
          VALIDATE_FEEDS: |
            import json, sys
            try:
                data = json.loads(open("/tmp/f.body").read())
            except Exception as e:
                print(f"feeds body is not valid JSON: {e}", file=sys.stderr)
                sys.exit(1)
            if not isinstance(data, dict):
                print(f"feeds body is not a JSON object (got {type(data).__name__})", file=sys.stderr)
                sys.exit(2)
            feeds = data.get("feeds")
            if not isinstance(feeds, list) or len(feeds) == 0:
                kind = type(feeds).__name__
                size = f"len={len(feeds)}" if isinstance(feeds, list) else "no len (not a list)"
                print(f"feeds.feeds is not a non-empty JSON array (got {kind}, {size})", file=sys.stderr)
                sys.exit(2)
            for feed in feeds:
                if not isinstance(feed, dict) or "feedId" not in feed:
                    print(f"feeds entry missing feedId: {feed}", file=sys.stderr)
                    sys.exit(3)
            print(f"{len(feeds)} feed(s) configured: {[f['feedId'] for f in feeds]}")
        run: |
          set -uo pipefail
          if [ "${SIMULATE_FAILURES:-false}" = "true" ]; then
            echo "::notice::simulate_failures=true; skipping real probe, treating as failure"
            echo "ok=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          # Probe /healthz (Fastify process alive) and /feeds
          # (poller actually producing data). Both are JSON and
          # bypass the CF 5 s cache rule on /rt/... - a stale
          # cached protobuf response can mask an origin outage
          # for the revalidation window, and probing binary
          # protobuf for the literal string "entity" is not
          # a useful signal.
          HSTATUS=$(curl -sS -m 10 -o /tmp/h.body -w '%{http_code}' https://gtfs-rt.n3ary.com/healthz || true)
          echo "healthz status=$HSTATUS"
          FSTATUS=$(curl -sS -m 10 -o /tmp/f.body -w '%{http_code}' https://gtfs-rt.n3ary.com/feeds || true)
          echo "feeds status=$FSTATUS"
          if [ "$HSTATUS" != "200" ] || [ "$FSTATUS" != "200" ]; then
            echo "::error::one or both endpoints non-200 (healthz=$HSTATUS feeds=$FSTATUS)"
            echo "ok=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ ! -s /tmp/h.body ] || [ ! -s /tmp/f.body ]; then
            echo "::error::one or both bodies empty"
            echo "ok=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          # /feeds body shape check: must be {"feeds": [{...}, ...]}
          # with at least one feedId-keyed entry. See VALIDATE_FEEDS
          # above for the full JSON schema.
          if ! python3 -c "$VALIDATE_FEEDS"; then
            echo "::error::feeds body validation failed (see validator output above)"
            echo "ok=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "ok=1" >> "$GITHUB_OUTPUT"

      - name: Skip rest if simulating recovery
        if: ${{ inputs.recover_now == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          echo "manually triggering recovery workflow"
          # GITHUB_TOKEN cannot dispatch workflows from inside a
          # workflow run by design (GHA security restriction).
          # Use the PAT in GH_DISPATCH_TOKEN (workflow scope)
          # instead.
          GH_TOKEN="$GH_DISPATCH_TOKEN" gh workflow run recovery.yml \
            --repo '${{ github.repository }}' \
            -f reason="manual-trigger-from-uptime-cron"
          echo "recovery workflow dispatched"

      - name: Compute state from last 3 runs
        # always() so the state machine still runs when the probe
        # failed - that's the whole point of the state machine.
        if: ${{ always() }}
        id: state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIMULATE_FAILURES: ${{ inputs.simulate_failures }}
          PROBE_OK: ${{ steps.probe.outputs.ok }}
        run: |
          set -euo pipefail
          # The current run's conclusion is null in the API at
          # this point (still in progress). Derive it from inputs
          # + probe output, then read the 2 prior runs.
          if [ "${SIMULATE_FAILURES:-false}" = "true" ]; then
            CURRENT="failure"
          elif [ -z "${PROBE_OK:-}" ]; then
            CURRENT="failure"
          elif [ "$PROBE_OK" = "0" ]; then
            CURRENT="failure"
          else
            CURRENT="success"
          fi
          PRIOR=$(gh api "repos/${{ github.repository }}/actions/workflows/uptime.yml/runs?per_page=3" \
            --jq '.workflow_runs | .[1:] | map(.conclusion) | join(",")')
          CONCLUSIONS="$PRIOR,$CURRENT"
          echo "last 3 conclusions: $CONCLUSIONS"
          FAIL_COUNT=$(echo "$CONCLUSIONS" | tr ',' '\n' | grep -c '^failure$' || true)
          echo "fail_count=$FAIL_COUNT" >> "$GITHUB_OUTPUT"
          # Ferry CONCLUSIONS to the next step via GITHUB_OUTPUT
          # (each step runs in a fresh shell, so a bare
          # $CONCLUSIONS here wouldn't be visible downstream).
          echo "conclusions=${CONCLUSIONS}" >> "$GITHUB_OUTPUT"
          if [ "$FAIL_COUNT" -ge 3 ]; then
            echo "state=DOWN" >> "$GITHUB_OUTPUT"
          elif [ "$FAIL_COUNT" -ge 1 ]; then
            echo "state=DEGRADED" >> "$GITHUB_OUTPUT"
          else
            echo "state=HEALTHY" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or close the incident issue
        if: ${{ always() && inputs.reset_state != 'true' && inputs.recover_now != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          STATE: ${{ steps.state.outputs.state }}
          CONCLUSIONS: ${{ steps.state.outputs.conclusions }}
        run: |
          set -euo pipefail
          ISSUE=$(gh issue list --state open --search "gtfs-rt.n3ary.com DOWN in:title" --json number --jq '.[0].number // empty')
          echo "current open issue: $ISSUE"
          if [ "$STATE" = "DOWN" ]; then
            if [ -z "$ISSUE" ]; then
              echo "creating incident issue"
              # `gh issue create` prints the URL to stdout on
              # success; extract the issue number from the
              # trailing path segment. (`--json number` is not
              # supported on `gh issue create`.)
              ISSUE_URL=$(gh issue create \
                --title "gtfs-rt.n3ary.com DOWN - $(date -u +%FT%TZ)" \
                --label "vm-restart-pending" \
                --body "$(cat <<EOF
          \`gtfs-rt.n3ary.com\` has failed 3 consecutive uptime
          checks. The recovery workflow has been triggered
          (Hetzner server reboot; the systemd unit
          \`neary-gtfs-rt.service\` auto-starts the container on
          boot).

          - Last 3 conclusions: ${CONCLUSIONS}
          - Triggered at: $(date -u +%FT%TZ)
          - First check after this issue was opened will close
            it if the service is back. The issue is reopened
            on the next 3-failure cycle.
          EOF
          )")
              ISSUE=$(echo "$ISSUE_URL" | grep -oE '/issues/[0-9]+$' | grep -oE '[0-9]+$')
              echo "created issue #$ISSUE ($ISSUE_URL)"
            else
              echo "issue already open: #$ISSUE - ensuring label"
              gh issue edit "$ISSUE" --add-label "vm-restart-pending" || true
            fi
            # Primary trigger: recovery.yml's `issues: types:
            # [opened, labeled]` event fires from `gh issue
            # create` / `gh issue edit` above. The manual
            # dispatch below is a belt-and-suspenders fallback
            # in case GH has already forgotten the labeled
            # event. Uses GH_DISPATCH_TOKEN (PAT with workflow
            # scope) - GITHUB_TOKEN can't dispatch workflows
            # by design.
            echo "triggering recovery workflow (manual dispatch)"
            GH_TOKEN="$GH_DISPATCH_TOKEN" gh workflow run recovery.yml \
              --repo '${{ github.repository }}' \
              -f reason="uptime-cron-3-consecutive-failures" \
              || echo "warn: gh workflow run failed; the issues.opened/labeled event should still fire"
          else
            # HEALTHY or DEGRADED. If there's an open issue,
            # close it - service is back (or the failures are
            # intermittent and the issue is no longer accurate).
            if [ -n "$ISSUE" ]; then
              echo "closing issue #$ISSUE - state=$STATE"
              gh issue close "$ISSUE" --comment "Auto-closed: state=$STATE (most recent cron run succeeded)."
            else
              echo "no incident issue to close"
            fi
          fi
          echo "final_state=$STATE" >> "$GITHUB_OUTPUT"
